basePath: /api/v1
definitions:
  github_com_shendrong_fullstack-go_server_internal_model.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.UserResponse'
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.Category:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      slug:
        type: string
      updated_at:
        type: string
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.CommentResponse:
    properties:
      author:
        $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.UserResponse'
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_deleted:
        type: boolean
      parent_id:
        type: string
      post_id:
        type: string
      replies:
        items:
          $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.CommentResponse'
        type: array
      updated_at:
        type: string
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.CreateCategoryRequest:
    properties:
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.CreateCommentRequest:
    properties:
      content:
        maxLength: 2000
        minLength: 1
        type: string
      parent_id:
        type: string
    required:
    - content
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.CreatePostRequest:
    properties:
      category_id:
        type: string
      content:
        minLength: 1
        type: string
      cover_image:
        maxLength: 500
        type: string
      excerpt:
        maxLength: 500
        type: string
      status:
        allOf:
        - $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.PostStatus'
        enum:
        - draft
        - published
      tag_ids:
        items:
          type: string
        type: array
      title:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - content
    - title
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.CreateTagRequest:
    properties:
      name:
        maxLength: 50
        minLength: 1
        type: string
    required:
    - name
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse:
    properties:
      details:
        additionalProperties:
          type: string
        type: object
      error:
        type: string
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.PostListItem:
    properties:
      author:
        $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.UserResponse'
      category:
        $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.Category'
      cover_image:
        type: string
      created_at:
        type: string
      excerpt:
        type: string
      id:
        type: string
      published_at:
        type: string
      slug:
        type: string
      status:
        $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.PostStatus'
      tags:
        items:
          $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.Tag'
        type: array
      title:
        type: string
      updated_at:
        type: string
      view_count:
        type: integer
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.PostListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.PostListItem'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.PostResponse:
    properties:
      author:
        $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.UserResponse'
      category:
        $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.Category'
      content:
        type: string
      cover_image:
        type: string
      created_at:
        type: string
      excerpt:
        type: string
      id:
        type: string
      published_at:
        type: string
      slug:
        type: string
      status:
        $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.PostStatus'
      tags:
        items:
          $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.Tag'
        type: array
      title:
        type: string
      updated_at:
        type: string
      view_count:
        type: integer
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.PostStatus:
    enum:
    - draft
    - published
    type: string
    x-enum-varnames:
    - PostStatusDraft
    - PostStatusPublished
  github_com_shendrong_fullstack-go_server_internal_model.RegisterRequest:
    properties:
      email:
        maxLength: 255
        type: string
      full_name:
        maxLength: 255
        minLength: 1
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - email
    - full_name
    - password
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.Tag:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      slug:
        type: string
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.UpdateCategoryRequest:
    properties:
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.UpdateCommentRequest:
    properties:
      content:
        maxLength: 2000
        minLength: 1
        type: string
    required:
    - content
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.UpdatePostRequest:
    properties:
      category_id:
        type: string
      content:
        minLength: 1
        type: string
      cover_image:
        maxLength: 500
        type: string
      excerpt:
        maxLength: 500
        type: string
      status:
        allOf:
        - $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.PostStatus'
        enum:
        - draft
        - published
      tag_ids:
        items:
          type: string
        type: array
      title:
        maxLength: 255
        minLength: 1
        type: string
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.UpdateProfileRequest:
    properties:
      avatar_url:
        maxLength: 2048
        type: string
      full_name:
        maxLength: 255
        minLength: 1
        type: string
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.UploadResponse:
    properties:
      filename:
        type: string
      size:
        type: integer
      url:
        type: string
    type: object
  github_com_shendrong_fullstack-go_server_internal_model.UserResponse:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: Production-grade REST API with JWT authentication, file upload, and
    PostgreSQL.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Fullstack Go API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with email and password, returns JWT token
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
      summary: Login user
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the profile of the currently authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
    patch:
      consumes:
      - application/json
      description: Allows updating full_name and/or avatar_url of the currently authenticated
        user
      parameters:
      - description: Profile update fields
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update current user profile
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account with email and password
      parameters:
      - description: Registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /categories:
    get:
      description: Returns all blog categories
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.Category'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
      summary: List categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Creates a new blog category. Requires authentication.
      parameters:
      - description: Category payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.Category'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a category
      tags:
      - categories
  /categories/{id}:
    delete:
      description: Deletes a blog category by ID. Requires authentication.
      parameters:
      - description: Category UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a category
      tags:
      - categories
    put:
      consumes:
      - application/json
      description: Updates a blog category by ID. Requires authentication.
      parameters:
      - description: Category UUID
        in: path
        name: id
        required: true
        type: string
      - description: Category update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.UpdateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.Category'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a category
      tags:
      - categories
  /comments/{id}:
    delete:
      description: Soft-deletes a comment. Only the original author can do this.
      parameters:
      - description: Comment UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a comment
      tags:
      - comments
    put:
      consumes:
      - application/json
      description: Edits the content of a comment. Only the original author can do
        this.
      parameters:
      - description: Comment UUID
        in: path
        name: id
        required: true
        type: string
      - description: Comment update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.UpdateCommentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.CommentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a comment
      tags:
      - comments
  /health:
    get:
      description: Returns server and database connection status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - system
  /posts:
    get:
      description: Returns a paginated list of blog posts with optional filtering
        by status, category, tag, author, and search
      parameters:
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page (default: 10, max: 100)'
        in: query
        name: page_size
        type: integer
      - description: Filter by status (draft or published)
        in: query
        name: status
        type: string
      - description: Filter by category UUID
        in: query
        name: category_id
        type: string
      - description: Filter by tag UUID
        in: query
        name: tag_id
        type: string
      - description: Filter by author UUID
        in: query
        name: author_id
        type: string
      - description: Search in title and excerpt
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.PostListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
      summary: List posts
      tags:
      - posts
    post:
      consumes:
      - application/json
      description: Creates a new blog post. Requires authentication.
      parameters:
      - description: Post payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.CreatePostRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.PostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a post
      tags:
      - posts
  /posts/{id}:
    delete:
      description: Deletes a blog post. Only the original author can delete it.
      parameters:
      - description: Post UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a post
      tags:
      - posts
    get:
      description: Returns a single blog post by its UUID, incrementing the view count
      parameters:
      - description: Post UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.PostResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_shendrong_fullstack-go_server_internal_model.ErrorResponse'
      summary: Get post by ID
      tags:
      - posts
    put:
      consumes:
      - application/json
      description: Updates a blog post. Only the original author can update it.
      parameters:
      - description: Post UUID
        in: path
        name: id
        required: true
        type: string
      - description: Post update payload
        in: body
        name: request
